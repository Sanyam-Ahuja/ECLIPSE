version: "3.9"

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    container_name: campugrid-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campugrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campugrid_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-campugrid}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campugrid}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campugrid-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: campugrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-campugrid}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-campugrid_dev_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application (Server & Workers) ---
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: campugrid-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: campugrid-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    command: ["celery", "-A", "app.celery_worker", "worker", "--loglevel=info", "-P", "prefork"]

  beat:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: campugrid-beat
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: ["celery", "-A", "app.celery_worker", "beat", "--loglevel=info"]

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: campugrid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: campugrid-grafana
    ports:
      - "3001:3000"
    environment:
volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
