global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "campugrid-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Contributor node metrics will be added dynamically
  # via file-based service discovery when nodes register
  - job_name: "campugrid-nodes"
    file_sd_configs:
      - files:
          - /etc/prometheus/nodes/*.json
        refresh_interval: 30s
